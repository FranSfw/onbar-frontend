<div class="relative flex min-h-screen w-full lg:grid lg:grid-cols-2 lg:h-screen lg:overflow-hidden bg-[#F6F8FC] lg:bg-white">
  
  <!-- Mobile/Tablet Background Image -->
  <div class="absolute inset-0 z-0 lg:hidden">
    <img src="assets/images/verify-email.jpg" class="w-full h-full object-cover opacity-80" alt="Background" />
  </div>

  <!-- Form Section -->
  <div class="relative z-10 flex flex-col items-center justify-center w-full px-4 sm:px-8 py-8 lg:px-24 xl:px-32 lg:h-full lg:bg-white overflow-y-auto">
    <div class="w-full max-w-sm lg:max-w-md bg-white p-8 lg:p-0 rounded-4xl lg:rounded-none shadow-2xl lg:shadow-none">
      <i class="ph ph-mailbox text-6xl lg:text-7xl text-[#283347]"></i>
      
      <h1 class="text-4xl lg:text-5xl text-left text-[#283347] py-4 font-bold">Verify Email</h1>
      <p class="text-left text-[#71799D] pb-6 lg:pb-8">
        You're almost there! We've sent you a quick verification!<br />
        Click the link in your email to confirm your identity and access your account.
      </p>
      
      <p class="text-sm text-black mb-8">
        Didn't get the email?
        <a class="text-[#4259ff] font-semibold hover:underline cursor-pointer" (click)="resendEmail()">
          Send it Again
        </a>
      </p>

      <p class="text-[#283347] mt-8 text-center lg:text-left">
        Already verified?&nbsp;
        <a class="text-[#71799D] font-semibold hover:text-[#144257] transition-colors cursor-pointer" routerLink="/login">Sign In</a>
      </p>
    </div>
  </div>

  <!-- Laptop Image Section -->
  <div class="hidden lg:block relative w-full h-full">
    <img 
      class="absolute inset-0 w-full h-full object-cover" 
      src="assets/images/verify-email.jpg" 
      alt="Verify Email Visual" 
    />
  </div>
</div>
