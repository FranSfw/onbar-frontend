<div class="grid grid-cols-1 lg:grid-cols-2 h-screen items-center justify-center px-8 lg:px-0">
  <div class="flex flex-col justify-center lg:px-20 text-left max-w-lg mx-auto lg:mx-0">
    <i class="ph ph-mailbox text-7xl text-[#283347] mb-6"></i>
    <h1 class="text-5xl font-bold text-[#283347] mb-4">Verify Email</h1>
    <p class="text-[#71799D] mb-6">
      You're almost there! We've sent you a quick verification!<br />
      Click the link in your email to confirm your identity and access your account.
    </p>
    <p class="text-sm text-black mb-8">
      Didn't get the email?
      <a class="text-[#4259ff] font-semibold hover:underline cursor-pointer" (click)="resendEmail()">
        Send it Again
      </a>
    </p>
    <p class="text-[#283347] flex justify-start">
      Already verified?&nbsp;
      <a class="text-[#4259ff] font-semibold hover:underline cursor-pointer" routerLink="/login">
        Sign In
      </a>
    </p>
  </div>

  <div class="hidden lg:flex items-center justify-center">
    <img
      src="assets/images/verify-email-dog.png"
      alt="Verify Email Dog"
      class="rounded-3xl w-[70%] object-cover shadow-xl"
    />
  </div>
</div>
