<div class="relative flex min-h-screen w-full lg:grid lg:grid-cols-2 lg:h-screen lg:overflow-hidden bg-[#F6F8FC] lg:bg-white">
  
  <!-- Mobile/Tablet Background Image -->
  <div class="absolute inset-0 z-0 lg:hidden">
    <img src="assets/images/forgot-password.jpg" class="w-full h-full object-cover opacity-80" alt="Background" />
  </div>

  <!-- Form Section -->
  <div class="relative z-10 flex flex-col items-center justify-center w-full px-4 sm:px-8 py-8 lg:px-24 xl:px-32 lg:h-full lg:bg-white overflow-y-auto">
    <div class="w-full max-w-sm lg:max-w-md bg-white p-8 lg:p-0 rounded-4xl lg:rounded-none shadow-2xl lg:shadow-none">
      <i class="ph ph-chef-hat text-6xl lg:text-7xl text-[#283347]"></i>
      <h1 class="text-4xl lg:text-5xl text-left text-[#283347] py-4 font-bold">Password<br />Recovery</h1>
      <p class="text-left text-[#71799D] pb-6 lg:pb-8">
        Enter your email to recover your password.
      </p>

      <div class="space-y-4">
        <app-input
          name="Email"
          type="email"
          id="emailFP"
          [(ngModel)]="email"
        ></app-input>
      </div>

      <br />
      <app-button text="Send" type="submit" (buttonClick)="onForgotPassword()"></app-button>

      <div
        *ngIf="errorMessage"
        class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm"
      >
        {{ errorMessage }}
      </div>

      <div
        *ngIf="successMessage"
        class="mt-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm"
      >
        {{ successMessage }}
      </div>
      
      <p class="text-[#283347] mt-8 text-center">
        Remember your password? 
        <a class="text-[#71799D] font-semibold hover:text-[#144257] transition-colors" routerLink="/login">Sign In</a>
      </p>
    </div>
  </div>

  <!-- Laptop Image Section -->
  <div class="hidden lg:block relative w-full h-full">
    <img 
      class="absolute inset-0 w-full h-full object-cover" 
      src="assets/images/forgot-password.jpg" 
      alt="Password recovery" 
    />
  </div>
</div>
